name: Windows build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build solution (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore BabelStudio.sln

      - name: Build (TreatWarningsAsErrors=true)
        # Release config exercises the WinUI packaging path (MakePri / PRI / .appx)
        # that Linux builds can't run, which is where XAML codegen warnings surface.
        run: dotnet build BabelStudio.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BabelStudio.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
